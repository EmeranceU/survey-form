<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootcamp Survey Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="title">Bootcamp Survey Form</h1>
      <p id="description">
        Help us improve the SheCanCode bootcamp experience by sharing your
        honest feedback below.
      </p>

      <form id="survey-form">
        <!-- Name Field -->
        <label id="name-label" for="name">Full Name <span class="required">*</span></label>
        <input
          type="text"
          id="name"
          placeholder="Enter your full name"
          required
        />

        <!-- Email Field -->
        <label id="email-label" for="email">Email Address <span class="required">*</span></label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email address"
          required
        />

        <!-- Number Field -->
        <label id="number-label" for="number">Age</label>
        <input
          type="number"
          id="number"
          placeholder="Enter your age"
          min="16"
          max="65"
        />

        <!-- Dropdown -->
        <label for="dropdown">Which cohort are you in?</label>
        <select id="dropdown">
          <option value="">-- Select your cohort --</option>
          <option value="cohort-1">Cohort 1</option>
          <option value="cohort-2">Cohort 2</option>
          <option value="cohort-3">Cohort 3</option>
          <option value="cohort-4">Cohort 4</option>
        </select>

        <!-- Radio Buttons -->
        <p class="group-label">
          How would you rate your bootcamp experience so far?
        </p>
        <div class="radio-group">
          <label>
            <input type="radio" name="experience" value="excellent" />
            Excellent
          </label>
          <label>
            <input type="radio" name="experience" value="good" />
            Good
          </label>
          <label>
            <input type="radio" name="experience" value="average" />
            Average
          </label>
          <label>
            <input type="radio" name="experience" value="needs-improvement" />
            Needs Improvement
          </label>
        </div>
